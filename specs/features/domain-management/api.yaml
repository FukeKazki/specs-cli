openapi: 3.1.0
info:
  title: Domain Management API
  version: 0.1.0
  description: |
    ドメイン (ユビキタス言語・モデル) を管理する API。
    一覧・詳細・更新・削除は Specs Management API の /specs を利用する
    (domain エントリの id は domain/glossary/<term>.md / domain/models/<model>.md)。
    本仕様では domain 固有の作成エンドポイントを定義する。
servers:
  - url: /api
paths:
  /domain/terms:
    post:
      summary: ユビキタス言語の作成
      operationId: createTerm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequest"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/Error"
  /domain/models:
    post:
      summary: モデルの作成 (mermaid テンプレート)
      operationId: createModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequest"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/Error"
components:
  responses:
    Created:
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
            required:
              - created
    Error:
      description: エラー
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            required:
              - error
  schemas:
    CreateRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name
